name: Release
on:
  push: { tags: ['v*'] }
permissions: { contents: write }
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26' }
      - name: Build
        run: |
          mkdir dist
          GOOS=linux GOARCH=amd64 go build -trimpath -o dist/agentban-linux-amd64 ./cmd/agentban
          GOOS=linux GOARCH=arm64 go build -trimpath -o dist/agentban-linux-arm64 ./cmd/agentban
          GOOS=darwin GOARCH=amd64 go build -trimpath -o dist/agentban-darwin-amd64 ./cmd/agentban
          GOOS=darwin GOARCH=arm64 go build -trimpath -o dist/agentban-darwin-arm64 ./cmd/agentban
      - uses: softprops/action-gh-release@v2
        with: { files: 'dist/*' }
