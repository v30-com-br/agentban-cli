name: Release
on:
  push: { branches: [main] }
  workflow_dispatch:
permissions: { contents: write }
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26' }
      - name: Build
        run: |
          mkdir dist
          GOOS=linux GOARCH=amd64 go build -trimpath -o dist/agentban-linux-amd64 ./cmd/agentban
          GOOS=linux GOARCH=arm64 go build -trimpath -o dist/agentban-linux-arm64 ./cmd/agentban
          GOOS=darwin GOARCH=amd64 go build -trimpath -o dist/agentban-darwin-amd64 ./cmd/agentban
          GOOS=darwin GOARCH=arm64 go build -trimpath -o dist/agentban-darwin-arm64 ./cmd/agentban
      # ponytail: release "rolling" na tag `latest`; binarios re-enviados a cada push.
      # Se quiser uma release versionada por commit, troque tag_name por ${{ github.sha }}.
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          files: 'dist/*'
          make_latest: true
